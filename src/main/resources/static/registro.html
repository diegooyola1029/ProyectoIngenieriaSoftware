<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papitas Limoncitas | Registro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">
    <div class="bg-orb orb-b"></div>
    <div class="bg-orb orb-c"></div>

    <main class="auth-layout register-layout">
        <section class="auth-showcase">
            <p class="eyebrow">Crea tu cuenta</p>
            <h1>Empieza a vender y pedir con una interfaz profesional.</h1>
            <p>Registro directo, campos claros y una experiencia lista para demostracion laboral o despliegue inicial.</p>
        </section>

        <section class="auth-card glass-panel">
            <p class="eyebrow">Registro</p>
            <h2>Crear cuenta</h2>
            <p class="muted">Completa tus datos para entrar al flujo de pedidos.</p>

            <form id="registerForm" class="auth-form" novalidate>
                <div class="input-wrap">
                    <label for="nombre">Nombre completo</label>
                    <input id="nombre" name="nombre" placeholder="Diego Ramirez">
                    <small class="field-error" data-error-for="nombre"></small>
                </div>

                <div class="input-wrap">
                    <label for="email">Correo</label>
                    <input id="email" name="email" type="email" placeholder="cliente@papitas.com">
                    <small class="field-error" data-error-for="email"></small>
                </div>

                <div class="input-wrap">
                    <label for="telefono">Telefono</label>
                    <input id="telefono" name="telefono" placeholder="+57 300 123 4567">
                    <small class="field-error" data-error-for="telefono"></small>
                </div>

                <div class="input-wrap">
                    <label for="password">Contrasena</label>
                    <input id="password" name="password" type="password" placeholder="Minimo 6 caracteres">
                    <small class="field-error" data-error-for="password"></small>
                </div>

                <button id="registerButton" class="primary-button" type="submit">Crear cuenta</button>
                <div id="registerMessage" class="inline-message hidden"></div>
            </form>

            <p class="auth-link-row">Ya tienes cuenta? <a href="login.html">Iniciar sesion</a></p>
        </section>
    </main>

    <script src="shared.js"></script>
    <script src="registro.js"></script>
</body>
</html>
