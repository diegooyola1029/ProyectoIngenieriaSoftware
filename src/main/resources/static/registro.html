<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro - Papitas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #d4fc79, #96e6a1);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: white;
    padding: 35px;
    border-radius: 20px;
    width: 350px;
    text-align: center;
    box-shadow: 0px 15px 40px rgba(0,0,0,0.2);
}

h2 {
    color: green;
}

.input-group {
    position: relative;
    margin: 10px 0;
}

.input-group i {
    position: absolute;
    left: 10px;
    top: 12px;
    color: gray;
}

.input-group input {
    width: 100%;
    padding: 10px 35px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(45deg, green, limegreen);
    color: white;
    border: none;
    border-radius: 10px;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background: darkgreen;
}

.error {
    color: red;
    margin-top: 10px;
}

.link {
    margin-top: 10px;
    display: block;
    color: green;
}
</style>
</head>

<body>

<div class="card">

<h2>📝 Crear cuenta</h2>

<div class="input-group">
    <i class="fa fa-user"></i>
    <input type="text" id="nombre" placeholder="Nombre completo">
</div>

<div class="input-group">
    <i class="fa fa-envelope"></i>
    <input type="email" id="email" placeholder="Correo">
</div>

<div class="input-group">
    <i class="fa fa-phone"></i>
    <input type="text" id="telefono" placeholder="+57...">
</div>

<div class="input-group">
    <i class="fa fa-lock"></i>
    <input type="password" id="password" placeholder="Contraseña">
</div>

<button onclick="registrar()">Registrarse</button>

<div id="error" class="error"></div>

<a href="login.html" class="link">¿Ya tienes cuenta? Inicia sesión</a>

</div>

<script>

function registrar() {

    const nombre = document.getElementById("nombre").value.trim();
    const email = document.getElementById("email").value.trim();
    const telefono = document.getElementById("telefono").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!nombre || !email || !telefono || !password) {
        mostrarError("Completa todos los campos ❌");
        return;
    }

    fetch("http://localhost:8081/usuarios/registro", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            nombre,
            email,
            telefono,
            password
        })
    })
    .then(res => {
        if (!res.ok) throw new Error();
        return res.json();
    })
    .then(() => {
        alert("Usuario registrado 🎉");
        window.location.href = "login.html";
    })
    .catch(() => mostrarError("Error al registrar ❌"));
}

function mostrarError(msg) {
    document.getElementById("error").innerText = msg;
}

</script>

</body>
</html>
